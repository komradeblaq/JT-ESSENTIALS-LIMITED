<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JT ESSENTIALS LIMITED</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    scroll-behavior:smooth;
}
header{
    background:#1f2d3d;
    color:white;
    padding:15px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:100;
}
header img{height:50px;}
header h1{font-size:20px;margin:0;}
nav{
    background:#ff6600;
    display:flex;
    justify-content:center;
    gap:15px;
    padding:10px;
    position:sticky;
    top:65px;
    z-index:99;
}
nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    font-size:14px;
    padding:5px 8px;
    border-radius:4px;
}
nav a.active, nav a:hover{
    background:white;
    color:#ff6600;
}
.price{
    color:#ff0000;
    font-weight:bold;
    margin-top:5px;
}
#floating-cart{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#007bff;
    color:white;
    padding:12px 16px;
    border-radius:30px;
    cursor:pointer;
    font-weight:bold;
    z-index:999;
}
section{padding:20px 15px;}
h2{text-align:center;margin-bottom:15px;}
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
}
.card{
    background:white;
    padding:10px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    text-align:center;
}
.card img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:6px;
}
button{
    padding:6px 10px;
    margin-top:6px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
    font-size:12px;
}
.order{background:#25D366;color:white;}
.cart-btn{background:#007bff;color:white;}
#cart-modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}
.cart-content{
    background:white;
    width:90%;
    max-width:400px;
    padding:20px;
    border-radius:10px;
    max-height:80%;
    overflow-y:auto;
}
#consultancy h2{color:red;}
</style>
</head>

<body>

<header>
<img src="images/LOGO.jpg">
<h1>JT ESSENTIALS LIMITED</h1>
</header>

<nav>
<a href="#raw-materials">Raw Materials</a>
<a href="#about">About Us</a>
<a href="consultancy.html">Consultancy</a>
<a href="#contact">Contact</a>
</nav>

<div id="floating-cart" onclick="openCart()">
🛒 Cart (<span id="cart-count">0</span>)
</div>

<section id="raw-materials">
<h2>Raw Materials</h2>
<div class="container" id="raw-materials-container"></div>
</section>

<section id="about">
<h2>About Us</h2>
<p><strong>REG. NO. 6899712</strong></p>
<p><strong>JT ESSENTIALS LIMITED – Consistency in quality delivery</strong></p>
</section>

<section id="contact">
<h2>Contact Us</h2>
<p style="text-align:center;">
📞 +2347065498338<br>
<a href="https://wa.me/2347065498338">Chat on WhatsApp</a>
</p>
</section>

<div id="cart-modal">
<div class="cart-content">
<h3>Your Cart</h3>
<div id="cart-items"></div>
<button onclick="sendCartOrder()" style="background:#25D366;color:white;width:100%;padding:10px;margin-top:15px;">Order via WhatsApp</button>
<button onclick="closeCart()" style="background:red;color:white;width:100%;padding:8px;margin-top:10px;">Close</button>
</div>
</div>

<script>

const products = [
{code:"SOYA_BEANS",name:"Soya Beans",price:"Price Available on Request"},
{code:"SOYA_CAKE",name:"Soya Cake",price:"₦600/kg"},
{code:"SOYA_MEAL",name:"Soya Meal",price:"₦750/kg"},
{code:"MAIZE",name:"Maize",price:"₦320/kg"},
{code:"MAIZE_OFFAL",name:"Maize Offal",price:"₦190/kg"},
{code:"GROUNDNUT_CAKE",name:"Groundnut Cake (GNC)",price:"₦580/kg"},
{code:"RICE_BRAN",name:"Rice Bran",price:"₦100/kg"},
{code:"WHEAT_OFFAL",name:"Wheat Offal",price:"₦350/kg"},
{code:"BONE_MEAL",name:"Bone Meal",price:"₦250/kg"},
{code:"LIMESTONE",name:"Limestone",price:"₦60/kg"},
{code:"PALM_KERNEL_CAKE",name:"Palm Kernel Cake (PKC Dry)",price:"₦280/kg"},
{code:"BDG",name:"Brewer’s Dried Grain (BDG)",price:"₦280/kg"},
{code:"METHIONINE",name:"Methionine",price:"₦125,000/bag"},
{code:"LYSINE",name:"Lysine",price:"₦80,000/bag"},
{code:"PREMIX",name:"Premix (2.5kg)",price:"₦3,500"},
{code:"ENZYMES",name:"Enzymes",price:"₦110,000/bag"},
{code:"SALT",name:"Industrial Salt",price:"₦20,000/bag"},
{code:"TOXIN_BINDER",name:"Toxin Binder",price:"₦55,000/bag"},
{code:"FISH_MEAL",name:"Fish Meal (Imported)",price:"₦150,000/bag"},
{code:"FISH_MEAL_65",name:"65% Fish Meal",price:"₦120,000/bag"},
{code:"LOCAL_FISH_MEAL_1",name:"Local Fish Meal (1st Grade)",price:"₦1,800/kg"},
{code:"LOCAL_FISH_MEAL_2",name:"Local Fish Meal (2nd Grade)",price:"₦2,500/kg"}
];

const container=document.getElementById("raw-materials-container");

products.forEach(item=>{
container.innerHTML+=`
<div class="card">
<img src="images/${item.code}.jpg">
<h4>${item.name}</h4>
<div class="price">${item.price}</div>
<button class="order" onclick="orderNow('${item.name}')">Order Now</button>
<button class="cart-btn" onclick="addToCart('${item.name}')">Add to Cart</button>
</div>`;
});

let cart=[];
function updateCartCounter(){document.getElementById("cart-count").innerText=cart.length;}
function addToCart(item){cart.push(item);updateCartCounter();openCart();}
function removeFromCart(index){cart.splice(index,1);updateCartCounter();openCart();}
function orderNow(item){
let msg="I want to order: "+item;
window.open("https://wa.me/2347065498338?text="+encodeURIComponent(msg));
}
function openCart(){
const div=document.getElementById("cart-items");
div.innerHTML="";
if(cart.length===0){div.innerHTML="<p>Your cart is empty.</p>";}
else{
cart.forEach((item,index)=>{
div.innerHTML+=`${index+1}. ${item} <button onclick="removeFromCart(${index})" style="background:red;color:white;font-size:10px;">Remove</button><br>`;
});
}
document.getElementById("cart-modal").style.display="flex";
}
function closeCart(){document.getElementById("cart-modal").style.display="none";}
function sendCartOrder(){
if(cart.length===0){alert("Cart is empty");return;}
let msg="I want to order these items: "+cart.join(", ");
window.open("https://wa.me/2347065498338?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
