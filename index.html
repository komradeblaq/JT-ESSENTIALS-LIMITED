<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JT ESSENTIALS LIMITED</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f6f9;overflow-x:hidden}

/* HEADER */
header{
background:#1f2d3d;color:white;padding:12px 20px;
display:flex;align-items:center;justify-content:space-between;
position:sticky;top:0;z-index:100
}
header img{height:50px}
header h1{font-size:18px;margin-left:10px}

.search-container input{
padding:6px 12px;border-radius:20px;border:none;width:180px
}

/* NAV */
nav{
background:#ff6600;display:flex;justify-content:center;
gap:10px;padding:8px;flex-wrap:wrap
}
nav a{
color:white;text-decoration:none;font-weight:bold;
font-size:13px;padding:6px 10px;border-radius:20px
}
nav a:hover{background:white;color:#ff6600}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

@media(max-width:1024px){
.container{grid-template-columns:repeat(3,1fr);}
}

@media(max-width:768px){
.container{grid-template-columns:repeat(2,1fr);gap:10px;}
.card img{height:100px;}
button{font-size:11px;}
}

/* CARD */
.card{
background:white;padding:10px;border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
text-align:center;transition:0.3s
}
.card:hover{transform:translateY(-5px)}

.card img{
width:100%;height:130px;object-fit:cover;border-radius:6px
}

.price{color:#e60000;font-weight:bold;margin:5px 0}

button{
padding:6px;border:none;border-radius:20px;
cursor:pointer;font-weight:bold;width:100%
}

.view-products{background:#25D366;color:white}
.contact-us{background:#007bff;color:white}

/* FILTER */
.filter-btn{
margin:5px;padding:6px 12px;border:none;
border-radius:20px;background:#ddd;cursor:pointer
}
.filter-btn:hover{background:#ff6600;color:white}

/* CART */
#floating-cart{
position:fixed;bottom:20px;right:20px;
background:#007bff;color:white;
padding:12px 18px;border-radius:30px;
font-weight:bold;z-index:999
}

/* WHATSAPP */
#whatsapp-float{
position:fixed;bottom:90px;right:20px;
background:#25D366;color:white;
font-size:28px;width:60px;height:60px;
border-radius:50%;display:flex;
align-items:center;justify-content:center;
text-decoration:none;z-index:999
}

/* MODAL */
#cart-modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);display:none;
justify-content:center;align-items:center
}
.cart-content{
background:white;width:90%;max-width:400px;
padding:20px;border-radius:10px
}

/* TOAST */
#cart-toast{
position:fixed;bottom:150px;right:20px;
background:#28a745;color:white;
padding:10px;border-radius:6px;display:none
}
</style>
</head>

<body>

<header>
<div style="display:flex;align-items:center;">
<img src="images/LOGO.jpg">
<h1>JT ESSENTIALS LIMITED</h1>
</div>

<div class="search-container">
<input type="text" placeholder="Search..." id="search-input" onkeyup="searchProducts()">
</div>
</header>

<nav>
<a href="#">Raw Materials</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<!-- FILTER -->
<div style="text-align:center;padding:10px">
<button class="filter-btn" onclick="filterCategory('all')">All</button>
<button class="filter-btn" onclick="filterCategory('grain')">Grains</button>
<button class="filter-btn" onclick="filterCategory('protein')">Protein</button>
<button class="filter-btn" onclick="filterCategory('additives')">Additives</button>
</div>

<div id="floating-cart">🛒 (<span id="cart-count">0</span>)</div>
<a id="whatsapp-float" href="https://wa.me/2347065498338" target="_blank">💬</a>
<div id="cart-toast">Added</div>

<section>
<h2 style="padding-left:10px">Raw Materials</h2>
<div class="container" id="raw-materials-container"></div>
</section>

<!-- CART -->
<div id="cart-modal">
<div class="cart-content">
<h3>Your Cart</h3>
<div id="cart-items"></div>
<button onclick="sendCartOrder()" style="background:#25D366;color:white">Order on WhatsApp</button>
<button onclick="closeCart()" style="background:red;color:white;margin-top:10px">Close</button>
</div>
</div>

<script>

// PRODUCTS
const products=[
{name:"MAIZE",price:"₦320/kg",category:"grain"},
{name:"SOYA_MEAL",price:"₦750/kg",category:"protein"},
{name:"SOYA_CAKE",price:"₦700/kg",category:"protein"},
{name:"GROUDNUT_CAKE",price:"₦580/kg",category:"protein"},
{name:"RICE_BRAN",price:"₦100/kg",category:"grain"},
{name:"PALM_KERNEL_CAKE",price:"₦280/kg",category:"protein"},
{name:"MAIZE_OFFAL",price:"₦190/kg",category:"grain"},
{name:"WHEAT_OFFAL",price:"₦350/kg",category:"grain"},
{name:"LIMESTONE",price:"₦60/kg",category:"additives"},
{name:"BONE_MEAL",price:"₦250/kg",category:"additives"},
{name:"BLOOD_MEAL",price:"₦700/bag",category:"protein"},
{name:"METHIONINE",price:"₦125,000/bag",category:"additives"},
{name:"LYSINE",price:"₦80,000/bag",category:"additives"},
{name:"FISH_MEAL",price:"Available",category:"protein"},
{name:"ENZYMES",price:"₦110,000/bag",category:"additives"},
{name:"TOXIN_BLINDER",price:"₦55,000/bag",category:"additives"},
{name:"DCP",price:"₦55,000/bag",category:"additives"},
{name:"SALT",price:"₦20,000/bag",category:"additives"},
{name:"PREMIX",price:"₦3,500",category:"additives"},
{name:"BREAD",price:"₦280/kg",category:"grain"},
{name:"VITAMIN_C",price:"₦5,500",category:"additives"},
{name:"CASSAVA",price:"₦800/kg",category:"grain"}
];

const container=document.getElementById("raw-materials-container");

products.forEach(item=>{
container.innerHTML+=`
<div class="card" data-category="${item.category}">
<img src="images/${item.name}.jpg">
<h4>${item.name}</h4>
<div class="price">${item.price}</div>
<button class="view-products" onclick="orderNow('${item.name}')">Order Now</button>
<button class="contact-us" onclick="addToCart('${item.name}')">Add</button>
</div>`;
});

// CART
let cart=[];

function updateCart(){
document.getElementById("cart-count").innerText=cart.length;
}

function addToCart(name){
if(cart.includes(name)){
showToast("Already added");
return;
}
cart.push(name);
updateCart();
showToast("Added");
}

function showToast(msg){
let t=document.getElementById("cart-toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

function openCart(){
let div=document.getElementById("cart-items");
div.innerHTML="";
cart.forEach(item=>{
div.innerHTML+=item+"<br>";
});
document.getElementById("cart-modal").style.display="flex";
}

function closeCart(){
document.getElementById("cart-modal").style.display="none";
}

function sendCartOrder(){
if(cart.length===0){
showToast("No item in cart");
return;
}
let msg="Order: "+cart.join(", ");
window.open("https://wa.me/2347065498338?text="+encodeURIComponent(msg));
}

document.getElementById("floating-cart").onclick=openCart;

// FILTER
function filterCategory(cat){
document.querySelectorAll(".card").forEach(card=>{
if(cat==="all"){card.style.display="block";}
else{card.style.display=card.dataset.category===cat?"block":"none";}
});
}

// SEARCH
function searchProducts(){
let input=document.getElementById("search-input").value.toLowerCase();
document.querySelectorAll(".card").forEach(card=>{
let name=card.querySelector("h4").innerText.toLowerCase();
card.style.display=name.includes(input)?"block":"none";
});
}

</script>

</body>
</html>
