<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JT Essentials Limited | Animal Feed Nigeria</title>

<meta name="description" content="Buy animal feed, poultry feed, livestock feed raw materials in Nigeria.">

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}

/* HEADER */
header{
background:#1f2d3d;color:white;padding:10px;
display:flex;flex-direction:column
}

.header-top{
display:flex;align-items:center;gap:10px
}

header img{
height:50px;width:50px;border-radius:8px;object-fit:cover
}

header h1{font-size:16px}

/* SEARCH */
.search-box input{
width:100%;padding:10px;border-radius:20px;border:none;margin-top:8px
}

/* NAV FIXED */
nav{
background:#ff6600;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:10px
}
nav a{
background:white;
color:#ff6600;
padding:8px 14px;
border-radius:20px;
text-decoration:none;
font-size:13px;
font-weight:bold
}

/* FILTER */
.filter-section{text-align:center;padding:10px}
.filter-btn{
display:block;width:90%;margin:6px auto;
padding:10px;border:none;border-radius:20px;
background:#ddd;font-weight:bold
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;padding:10px
}

/* CARD */
.card{
background:white;padding:10px;border-radius:10px;text-align:center
}
.card img{
width:100%;height:110px;object-fit:cover;border-radius:6px
}

.price{color:red;font-weight:bold}

button{
width:100%;padding:8px;border:none;border-radius:20px;margin-top:5px
}

.view-products{background:#25D366;color:white}
.contact-us{background:#007bff;color:white}

/* FLOAT CART */
#floating-cart{
position:fixed;bottom:20px;right:20px;
background:#007bff;color:white;
padding:14px 20px;border-radius:30px;
font-weight:bold;z-index:999
}

/* CART */
#cart-modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;justify-content:center;align-items:center
}

.cart-content{
background:white;width:95%;max-width:400px;
border-radius:10px;display:flex;flex-direction:column;
max-height:90%
}

.cart-items{overflow-y:auto;padding:10px;flex:1}

.cart-footer{padding:10px}

#cart-toast{
position:fixed;bottom:120px;right:20px;
background:#28a745;color:white;padding:10px;border-radius:6px;
display:none
}

.about,#contact{padding:20px}
</style>
</head>

<body>

<header>
<div class="header-top">
<img src="images/LOGO.jpg">
<h1>JT ESSENTIALS LIMITED</h1>
</div>

<div class="search-box">
<input type="text" placeholder="Search products..." onkeyup="searchProducts()" id="search">
</div>
</header>

<nav>
<a href="#raw">Raw Materials</a>
<a href="#about">About Us</a>
<a href="consultancy.html">Consultancy</a>
<a href="#contact">Contact</a>
</nav>

<div class="filter-section">
<button class="filter-btn" onclick="filter('all')">All</button>
<button class="filter-btn" onclick="filter('grain')">Grains</button>
<button class="filter-btn" onclick="filter('protein')">Protein</button>
<button class="filter-btn" onclick="filter('additives')">Additives</button>
</div>

<div id="floating-cart">🛒 Cart (<span id="count">0</span>)</div>

<div id="cart-toast"></div>

<section id="raw">
<h2 style="padding-left:10px">Raw Materials</h2>
<div class="container" id="container"></div>
</section>

<section id="about" class="about">
<h2>About Us</h2>
<p><strong>REG. NO. 6899712</strong></p>
<p>JT Essentials Limited supplies livestock feed materials across Nigeria.</p>
</section>

<section id="contact">
<h2>Contact</h2>
<p>📧 jtessentialslimited@gmail.com<br>📞 +2347065498338</p>
</section>

<!-- CART -->
<div id="cart-modal">
<div class="cart-content">

<div class="cart-items" id="cart-items"></div>

<div class="cart-footer">
<button onclick="sendCart()" style="background:#25D366;color:white">
Proceed to Order
</button>

<button onclick="closeCart()" style="background:red;color:white">
Close
</button>
</div>

</div>
</div>

<script>

/* PRODUCTS */
const products=[
{name:"MAIZE",price:"₦320/kg",cat:"grain"},
{name:"SOYA_MEAL",price:"₦750/kg",cat:"protein"},
{name:"SOYA_CAKE",price:"₦700/kg",cat:"protein"},
{name:"GROUDNUT_CAKE",price:"₦580/kg",cat:"protein"},
{name:"RICE_BRAN",price:"₦100/kg",cat:"grain"},
{name:"PALM_KERNEL_CAKE",price:"₦280/kg",cat:"protein"},
{name:"MAIZE_OFFAL",price:"₦190/kg",cat:"grain"},
{name:"WHEAT_OFFAL",price:"₦350/kg",cat:"grain"},
{name:"LIMESTONE",price:"₦60/kg",cat:"additives"},
{name:"BONE_MEAL",price:"₦250/kg",cat:"additives"},
{name:"BLOOD_MEAL",price:"₦700/bag",cat:"protein"},
{name:"METHIONINE",price:"₦125000/bag",cat:"additives"},
{name:"LYSINE",price:"₦80000/bag",cat:"additives"}
];

const container=document.getElementById("container");

products.forEach(p=>{
container.innerHTML+=`
<div class="card" data-cat="${p.cat}">
<img src="images/${p.name}.jpg">
<h4>${p.name}</h4>
<div class="price">${p.price}</div>
<button class="view-products" onclick="orderNow('${p.name}')">Order</button>
<button class="contact-us" onclick="addToCart('${p.name}')">Add</button>
</div>`;
});

/* FILTER */
function filter(cat){
document.querySelectorAll(".card").forEach(c=>{
c.style.display=(cat==="all"||c.dataset.cat===cat)?"block":"none";
});
}

/* SEARCH */
function searchProducts(){
let v=document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
}

/* CART (FIXED STORAGE) */
let cart=JSON.parse(localStorage.getItem("jt_cart"))||[];

function saveCart(){
localStorage.setItem("jt_cart",JSON.stringify(cart));
}

function updateCart(){
document.getElementById("count").innerText=
cart.reduce((a,b)=>a+b.qty,0);
saveCart();
}
updateCart();

/* ADD */
function addToCart(name){
let item=cart.find(i=>i.name===name);
if(item){item.qty++}else{cart.push({name,qty:1})}
updateCart();
toast("Added");
}

/* OPEN CART */
function openCart(){
let div=document.getElementById("cart-items");
div.innerHTML="";

cart.forEach((i,index)=>{
div.innerHTML+=`
${i.name} x${i.qty}
<button onclick="inc(${index})">+</button>
<button onclick="dec(${index})">-</button>
<button onclick="removeItem(${index})">❌</button>
<br><br>`;
});

document.getElementById("cart-modal").style.display="flex";
}

/* REMOVE FIX */
function removeItem(i){
cart.splice(i,1);
updateCart();
openCart();
}

function inc(i){cart[i].qty++;updateCart();openCart();}
function dec(i){cart[i].qty>1?cart[i].qty--:cart.splice(i,1);updateCart();openCart();}

function closeCart(){
document.getElementById("cart-modal").style.display="none";
}

/* WHATSAPP MESSAGE FIX */
function sendCart(){
if(cart.length===0){toast("Cart empty");return;}

let msg="I want to order the following items:\n";
cart.forEach(i=>{
msg+=`${i.name} x${i.qty}\n`;
});

window.open("https://wa.me/2347065498338?text="+encodeURIComponent(msg));
}

/* ORDER NOW */
function orderNow(name){
window.open("https://wa.me/2347065498338?text=I want to order "+name);
}

/* TOAST */
function toast(t){
let el=document.getElementById("cart-toast");
el.innerText=t;
el.style.display="block";
setTimeout(()=>el.style.display="none",1500);
}

document.getElementById("floating-cart").onclick=openCart;

</script>

</body>
</html>
