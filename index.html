<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JT Essentials Limited | Animal Feed & Livestock Raw Materials Nigeria</title>

<meta name="description" content="Buy quality poultry feed, animal feed and livestock raw materials in Nigeria. Nationwide delivery available.">
<meta name="keywords" content="animal feed Nigeria, poultry feed, chicken feed, fish feed, livestock raw materials, maize, soya meal">
<meta name="author" content="JT Essentials Limited">

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}

/* HEADER */
header{background:#1f2d3d;color:white;padding:10px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center}
header img{height:45px}
header h1{font-size:16px;margin-left:8px}

/* SEARCH */
.search-box{margin-top:8px}
.search-box input{width:100%;padding:8px;border-radius:20px;border:none}

/* NAV */
nav{background:#ff6600;display:flex;justify-content:center;gap:8px;padding:10px;flex-wrap:wrap}
nav a{background:white;color:#ff6600;padding:6px 12px;border-radius:20px;text-decoration:none;font-weight:bold}

/* FILTER */
.filter{text-align:center;padding:10px}
.filter button{margin:5px;padding:6px 12px;border:none;border-radius:20px;font-weight:bold}

/* GRID */
.container{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:10px}
@media(max-width:768px){.container{grid-template-columns:repeat(2,1fr)}}

/* CARD */
.card{background:white;padding:10px;border-radius:10px;text-align:center}
.card img{width:100%;height:110px;object-fit:cover;border-radius:6px}
.price{color:red;font-weight:bold}

button{width:100%;padding:6px;border:none;border-radius:20px;margin-top:5px;font-weight:bold}
.order{background:#25D366;color:white}
.add{background:#007bff;color:white}

/* FLOAT */
#cart-btn{
position:fixed;bottom:20px;right:20px;
background:#007bff;color:white;
padding:14px 20px;border-radius:30px;
font-weight:bold;z-index:999;
}

/* CART */
#cart-modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);display:none;
justify-content:center;align-items:center;
}

.cart{
background:white;width:95%;max-width:400px;
border-radius:10px;display:flex;flex-direction:column;
max-height:90%;
}

.cart-items{flex:1;overflow-y:auto;padding:10px}
.cart-footer{padding:10px}

/* CONTACT */
section{padding:20px}
</style>
</head>

<body>

<header>
<div class="header-top">
<img src="images/LOGO.jpg">
<h1>JT ESSENTIALS LIMITED</h1>
</div>

<div class="search-box">
<input type="text" placeholder="Search..." id="search" onkeyup="searchProducts()">
</div>
</header>

<nav>
<a href="#products">Products</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</nav>

<div class="filter">
<button onclick="filter('all')">All</button>
<button onclick="filter('grain')">Grains</button>
<button onclick="filter('protein')">Protein</button>
<button onclick="filter('additives')">Additives</button>
</div>

<div id="cart-btn">🛒 Cart (<span id="count">0</span>)</div>

<section id="products">
<h2>Raw Materials</h2>
<div class="container" id="box"></div>
</section>

<section id="about">
<h2>About Us</h2>
<p>JT Essentials Limited delivers high-quality livestock feed and raw materials across Nigeria.</p>
</section>

<section id="contact">
<h2>Contact</h2>
<p>📞 +2347065498338</p>
<p>📧 jtessentialslimited@gmail.com</p>
</section>

<!-- CART -->
<div id="cart-modal">
<div class="cart">

<div class="cart-items" id="cart-items"></div>

<div class="cart-footer">
<button onclick="sendCart()" style="background:#25D366;color:white">Order on WhatsApp</button>
<button onclick="closeCart()" style="background:red;color:white">Close</button>
</div>

</div>
</div>

<script>

// FULL PRODUCTS
const products=[
{name:"MAIZE",price:"₦320/kg",cat:"grain"},
{name:"SOYA_MEAL",price:"₦750/kg",cat:"protein"},
{name:"SOYA_CAKE",price:"₦700/kg",cat:"protein"},
{name:"GROUDNUT_CAKE",price:"₦580/kg",cat:"protein"},
{name:"RICE_BRAN",price:"₦100/kg",cat:"grain"},
{name:"PALM_KERNEL_CAKE",price:"₦280/kg",cat:"protein"},
{name:"MAIZE_OFFAL",price:"₦190/kg",cat:"grain"},
{name:"WHEAT_OFFAL",price:"₦350/kg",cat:"grain"},
{name:"LIMESTONE",price:"₦60/kg",cat:"additives"},
{name:"BONE_MEAL",price:"₦250/kg",cat:"additives"},
{name:"BLOOD_MEAL",price:"₦700/bag",cat:"protein"},
{name:"METHIONINE",price:"₦125,000/bag",cat:"additives"},
{name:"LYSINE",price:"₦80,000/bag",cat:"additives"},
{name:"ENZYMES",price:"₦110,000/bag",cat:"additives"},
{name:"TOXIN_BLINDER",price:"₦55,000/bag",cat:"additives"},
{name:"DCP",price:"₦55,000/bag",cat:"additives"},
{name:"SALT",price:"₦20,000/bag",cat:"additives"},
{name:"PREMIX",price:"₦3,500",cat:"additives"},
{name:"BREAD",price:"₦280/kg",cat:"grain"},
{name:"VITAMIN_C",price:"₦5,500",cat:"additives"},
{name:"CASSAVA",price:"₦800/kg",cat:"grain"}
];

// RENDER
const box=document.getElementById("box");
products.forEach(p=>{
box.innerHTML+=`
<div class="card" data-cat="${p.cat}">
<img src="images/${p.name}.jpg">
<h4>${p.name}</h4>
<div class="price">${p.price}</div>
<button class="order" onclick="order('${p.name}')">Order</button>
<button class="add" onclick="addToCart('${p.name}')">Add to Cart</button>
</div>`;
});

// FILTER
function filter(cat){
document.querySelectorAll(".card").forEach(c=>{
c.style.display=(cat==="all"||c.dataset.cat===cat)?"block":"none";
});
}

// SEARCH
function searchProducts(){
let v=document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
}

// CART SYSTEM
let cart=[];

function updateCart(){
document.getElementById("count").innerText=cart.reduce((a,b)=>a+b.qty,0);
}

function addToCart(name){
let item=cart.find(i=>i.name===name);
if(item){item.qty++}else{cart.push({name,qty:1})}
updateCart();
}

function openCart(){
let div=document.getElementById("cart-items");
div.innerHTML="";
cart.forEach((item,i)=>{
div.innerHTML+=`
${item.name} x${item.qty}
<button onclick="inc(${i})">+</button>
<button onclick="dec(${i})">-</button>
<button onclick="removeItem(${i})">❌</button><br><br>`;
});
document.getElementById("cart-modal").style.display="flex";
}

function inc(i){cart[i].qty++;updateCart();openCart()}
function dec(i){cart[i].qty>1?cart[i].qty--:cart.splice(i,1);updateCart();openCart()}
function removeItem(i){cart.splice(i,1);updateCart();openCart()}

function closeCart(){document.getElementById("cart-modal").style.display="none"}

function sendCart(){
if(cart.length===0){alert("No item in cart");return;}
let msg="Hello, I want to order:\n"+cart.map(i=>i.name+" x"+i.qty).join("\n");
window.open("https://wa.me/2347065498338?text="+encodeURIComponent(msg));
}

function order(name){
window.open("https://wa.me/2347065498338?text=I want "+name);
}

document.getElementById("cart-btn").onclick=openCart;

</script>

</body>
</html>
